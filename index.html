<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Quiz App</title>
</head>
<body style="font-family: Arial; padding:20px">

<h2>Upload file Excel để bắt đầu</h2>
<input type="file" id="file" />

<div id="app"></div>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<script>
let questions = [];
let current = 0;
let answers = {};
let time = 1800;
let timer;

document.getElementById('file').addEventListener('change', function(e){
  const reader = new FileReader();
  reader.onload = function(evt){
    const data = new Uint8Array(evt.target.result);
    const workbook = XLSX.read(data, {type:'array'});
    const sheet = workbook.Sheets[workbook.SheetNames[0]];
    const json = XLSX.utils.sheet_to_json(sheet);

    questions = json.map((r,i)=>({
      id:i,
      question:r["Câu hỏi"],
      A:r["Đáp án A"],
      B:r["Đáp án B"],
      C:r["Đáp án C"],
      D:r["Đáp án D"],
      correct:r["Đáp án đúng"]
    }));

    startQuiz();
  };
  reader.readAsArrayBuffer(e.target.files[0]);
});

function startQuiz(){
  timer = setInterval(()=>{
    time--;
    render();
  },1000);
  render();
}

function render(){
  const app = document.getElementById('app');

  if(time<=0){
    clearInterval(timer);
    return showResult();
  }

  const q = questions[current];

  app.innerHTML = `
    <div>
      <b>Câu ${current+1}/${questions.length}</b>
      <span style="float:right">${Math.floor(time/60)}:${("0"+time%60).slice(-2)}</span>
    </div>
    <h3>${q.question}</h3>
    ${["A","B","C","D"].map(k=>`
      <button onclick="select('${k}')">${k}. ${q[k]}</button><br><br>
    `).join("")}
    <button onclick="prev()">Back</button>
    <button onclick="next()">Next</button>
    <button onclick="submit()">Submit</button>
  `;
}

function select(k){
  answers[current]=k;
}

function next(){
  if(current<questions.length-1) current++;
  render();
}

function prev(){
  if(current>0) current--;
  render();
}

function submit(){
  clearInterval(timer);
  showResult();
}

function showResult(){
  let score=0;
  questions.forEach((q,i)=>{
    if(answers[i]===q.correct) score++;
  });

  document.getElementById('app').innerHTML = `
    <h2>Kết quả</h2>
    <h3>${score}/${questions.length}</h3>
    <button onclick="location.reload()">Làm lại</button>
  `;
}
</script>

</body>
</html>
