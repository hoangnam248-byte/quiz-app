<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Quiz PRO FINAL</title>

<style>
body { margin:0; font-family:Arial; display:flex; }

#sidebar {
  width:250px; height:100vh; overflow:auto;
  background:#f4f4f4; padding:10px;
}

.q-btn {
  width:40px; height:40px; margin:5px;
  border:none; border-radius:6px; cursor:pointer;
  background:#ddd;
}

.current { background:#2196f3; color:white; }
.correct-btn { background:#4caf50; color:white; }
.wrong-btn { background:#f44336; color:white; }

#main { flex:1; padding:20px; }

.answer {
  padding:10px; margin:10px 0;
  border-radius:8px; border:1px solid #ccc;
  cursor:pointer;
}

.correct { background:#4caf50; color:white; }
.wrong { background:#f44336; color:white; }

.topbar {
  display:flex;
  justify-content:space-between;
  font-weight:bold;
}

#progress {
  height:10px;
  background:#ddd;
  border-radius:5px;
  margin:10px 0;
}

#progress-bar {
  height:10px;
  background:#4caf50;
  width:0%;
  border-radius:5px;
}

button {
  padding:8px 12px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}
</style>
</head>

<body>

<div id="sidebar"></div>

<div id="main">
  <h2>Quiz PRO</h2>

  <div>
    <button onclick="startMode('practice')">Luyện tập</button>
    <button onclick="startMode('exam')">Thi thật</button>
    <button onclick="redoWrong()">Làm lại câu sai</button>
  </div>

  <div id="progress"><div id="progress-bar"></div></div>

  <div id="app"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<script>
let questions = [];
let current = 0;
let answers = {};
let wrongList = [];
let time = 3600;
let timer;
let mode = "practice";

// 👉 TÍNH ĐIỂM REALTIME
function getScore(){
  let score = 0;
  questions.forEach((q,i)=>{
    if(answers[i] === q.correct) score++;
  });
  return score;
}

async function startMode(m){
  mode = m;
  await loadExcel();
}

async function loadExcel(){
  const url = "https://raw.githubusercontent.com/hoangnam248-byte/quiz-app/main/data.xlsx";

  const res = await fetch(url);
  const buffer = await res.arrayBuffer();

  const wb = XLSX.read(buffer, {type:'array'});
  const sheet = wb.Sheets[wb.SheetNames[0]];
  const json = XLSX.utils.sheet_to_json(sheet);

  questions = json.map((r,i)=>({
    id:i,
    question:r["Câu hỏi"],
    A:r["Đáp án A"],
    B:r["Đáp án B"],
    C:r["Đáp án C"],
    D:r["Đáp án D"],
    correct:r["Đáp án đúng"]
  }));

  questions.sort(()=>Math.random()-0.5);
  questions = questions.slice(0,70);

  startQuiz();
}

function startQuiz(){
  answers = {};
  wrongList = [];
  current = 0;
  time = 3600;

  clearInterval(timer);
  timer = setInterval(()=>{
    time--;
    render();
  },1000);

  render();
}

function render(){
  const app = document.getElementById("app");

  if(time<=0){ submit(); return; }

  const q = questions[current];

  // progress
  const done = Object.keys(answers).length;
  const percent = Math.floor((done/questions.length)*100);
  document.getElementById("progress-bar").style.width = percent+"%";

  app.innerHTML = `
    <div class="topbar">
      <span>Câu ${current+1}/${questions.length}</span>
      <span>Điểm: ${getScore()} / ${questions.length}</span>
      <span>${Math.floor(time/60)}:${("0"+time%60).slice(-2)}</span>
    </div>

    <h3>${q.question}</h3>

    ${["A","B","C","D"].map(k=>{
      let cls="answer";

      // 👉 Luyện tập: hiện đúng sai ngay
      if(mode==="practice" && answers[current]){
        if(k===q.correct) cls+=" correct";
        if(answers[current]===k && k!==q.correct) cls+=" wrong";
      }

      // 👉 Thi thật: chỉ highlight đã chọn
      if(mode==="exam" && answers[current]===k){
        cls+=" correct-btn";
      }

      return `<div class="${cls}" onclick="select('${k}')">
        ${k}. ${q[k]}
      </div>`;
    }).join("")}

    <button onclick="prev()">⬅</button>
    <button onclick="next()">➡</button>
    <button onclick="submit()">Nộp bài</button>
  `;

  renderSidebar();
}

function renderSidebar(){
  const sb = document.getElementById("sidebar");

  sb.innerHTML = questions.map((q,i)=>{
    let cls="q-btn";

    if(i===current) cls+=" current";

    if(answers[i]){
      if(answers[i]===q.correct) cls+=" correct-btn";
      else cls+=" wrong-btn";
    }

    return `<button class="${cls}" onclick="go(${i})">${i+1}</button>`;
  }).join("");
}

function select(k){
  if(mode==="practice" && answers[current]) return;
  answers[current]=k;
  render();
}

function next(){ if(current<questions.length-1) current++; render(); }
function prev(){ if(current>0) current--; render(); }
function go(i){ current=i; render(); }

function submit(){
  clearInterval(timer);

  let score=0;
  wrongList=[];

  questions.forEach((q,i)=>{
    if(answers[i]===q.correct) score++;
    else wrongList.push(q);
  });

  document.getElementById("app").innerHTML = `
    <h2>Kết quả</h2>
    <h3>${score}/${questions.length}</h3>
    <button onclick="redoWrong()">Làm lại câu sai</button>
  `;
}

function redoWrong(){
  if(wrongList.length===0){
    alert("Không có câu sai!");
    return;
  }
  questions = wrongList;
  current=0;
  startQuiz();
}
</script>

</body>
</html>
