<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz PRO MAX</title>

<style>
body { margin:0; font-family:Arial; background:#f5f5f5; }

/* HEADER */
.header {
  position:fixed; top:0; left:0; right:0;
  background:white; padding:10px;
  z-index:10;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

/* SIDEBAR */
#sidebar {
  position:fixed;
  left:-100%;
  top:0;
  width:80%;
  height:100%;
  background:white;
  overflow:auto;
  transition:0.3s;
  z-index:20;
  padding:10px;
}
#sidebar.open { left:0; }

.q-btn {
  width:40px; height:40px;
  margin:5px;
  border:none;
  border-radius:6px;
  background:#ddd;
}

.current { background:#2196f3; color:white; }
.correct-btn { background:#4caf50; color:white; }
.wrong-btn { background:#f44336; color:white; }
.bookmark-btn { border:2px solid gold; }

/* CONTENT */
.container { padding:80px 15px 120px; }

.answer {
  padding:15px; margin:10px 0;
  border-radius:10px;
  border:1px solid #ddd;
}

.correct { background:#4caf50; color:white; }
.wrong { background:#f44336; color:white; }

.nav {
  position:fixed; bottom:0; left:0; right:0;
  display:flex; background:white;
}
.nav button {
  flex:1; padding:15px;
  font-size:18px;
}

/* MENU */
.menu {
  position:fixed;
  top:15px;
  left:10px;
  font-size:20px;
  z-index:30;
}
</style>
</head>

<body>

<div class="menu" onclick="toggleSidebar()">☰</div>

<div id="sidebar"></div>

<div class="header">
  <div id="info"></div>
</div>

<div class="container" id="app"></div>

<div class="nav">
  <button onclick="prev()">⬅</button>
  <button onclick="next()">➡</button>
  <button onclick="submit()">Nộp</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<script>
let allQuestions=[];
let questions=[];
let answers={};
let bookmarks={};
let wrongList=[];
let current=0;
let mode="practice";
let user = localStorage.getItem("user") || prompt("Nhập tên:");
localStorage.setItem("user", user);

// TOGGLE SIDEBAR
function toggleSidebar(){
  document.getElementById("sidebar").classList.toggle("open");
}

// LOAD
async function loadExcel(){
  const url="https://raw.githubusercontent.com/hoangnam248-byte/quiz-app/main/data.xlsx";
  const res=await fetch(url);
  const buf=await res.arrayBuffer();

  const wb=XLSX.read(buf,{type:'array'});
  const sheet=wb.Sheets[wb.SheetNames[0]];
  const json=XLSX.utils.sheet_to_json(sheet);

  allQuestions=json.map(r=>({
    question:r["Câu hỏi"],
    A:r["Đáp án A"],
    B:r["Đáp án B"],
    C:r["Đáp án C"],
    D:r["Đáp án D"],
    correct:r["Đáp án đúng"]
  }));

  startMode("practice");
}

// MODE
function startMode(m){
  mode=m;
  answers={};
  current=0;

  if(m==="practice"){
    questions=[...allQuestions];
  } else if(m==="exam"){
    questions=[...allQuestions].sort(()=>Math.random()-0.5).slice(0,70);
  } else if(m==="wrong"){
    questions=[...wrongList];
  }

  render();
}

// SCORE
function getScore(){
  let s=0;
  questions.forEach((q,i)=>{
    if(answers[i]===q.correct) s++;
  });
  return s;
}

// RENDER
function render(){
  const q=questions[current];

  document.getElementById("info").innerHTML =
    `${user} | ${mode.toUpperCase()} | Câu ${current+1}/${questions.length} | Điểm: ${getScore()}`;

  document.getElementById("app").innerHTML = `
    <h3>${q.question}</h3>

    ${["A","B","C","D"].map(k=>{
      let cls="answer";

      if(bookmarks[current]) cls+=" bookmark";

      if(answers[current]){
        if(k===q.correct) cls+=" correct";
        if(answers[current]===k && k!==q.correct) cls+=" wrong";
      }

      return `<div class="${cls}" onclick="select('${k}')">${k}. ${q[k]}</div>`;
    }).join("")}

    <button onclick="toggleBookmark()">⭐ Bookmark</button>

    <hr>

    <button onclick="startMode('practice')">🎯 Luyện tập</button>
    <button onclick="startMode('exam')">📝 Thi thật</button>
    <button onclick="startMode('wrong')">🔁 Câu sai</button>
  `;

  renderSidebar();
}

// SIDEBAR
function renderSidebar(){
  const sb=document.getElementById("sidebar");

  sb.innerHTML = `
    <h3>Menu</h3>
    <button onclick="startMode('practice')">🎯 Luyện tập</button>
    <button onclick="startMode('exam')">📝 Thi thật</button>
    <button onclick="startMode('wrong')">🔁 Câu sai</button>
    <hr>
    ${questions.map((q,i)=>{
      let cls="q-btn";

      if(i===current) cls+=" current";

      if(bookmarks[i]) cls+=" bookmark-btn";

      if(answers[i]){
        if(answers[i]===q.correct) cls+=" correct-btn";
        else cls+=" wrong-btn";
      }

      return `<button class="${cls}" onclick="go(${i})">${i+1}</button>`;
    }).join("")}
  `;
}

// ACTION
function select(k){
  if(answers[current]) return;
  answers[current]=k;
  render();
}

function next(){ if(current<questions.length-1) current++; render(); }
function prev(){ if(current>0) current--; render(); }
function go(i){ current=i; toggleSidebar(); render(); }

function toggleBookmark(){
  bookmarks[current]=!bookmarks[current];
  render();
}

// SUBMIT
function submit(){
  let score=getScore();
  wrongList = questions.filter((q,i)=>answers[i]!==q.correct);

  document.getElementById("app").innerHTML = `
    <h2>Kết quả</h2>
    <h3>${score}/${questions.length}</h3>
    <button onclick="startMode('wrong')">🔁 Làm lại câu sai</button>
  `;
}

loadExcel();
</script>

</body>
</html>
