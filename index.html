<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Mobile PRO</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#f5f5f5;
}

/* HEADER */
.header {
  position:fixed;
  top:0;
  left:0;
  right:0;
  background:white;
  padding:10px;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
  z-index:10;
}

.topbar {
  display:flex;
  justify-content:space-between;
  font-weight:bold;
}

/* CONTENT */
.container {
  padding:80px 15px 100px;
}

/* PROGRESS */
#progress {
  height:6px;
  background:#ddd;
  border-radius:5px;
  margin-top:5px;
}

#progress-bar {
  height:6px;
  background:#4caf50;
  width:0%;
  border-radius:5px;
}

/* QUESTION */
.question {
  background:white;
  padding:15px;
  border-radius:10px;
  margin-top:10px;
}

/* ANSWER */
.answer {
  background:white;
  padding:15px;
  margin:10px 0;
  border-radius:10px;
  border:1px solid #ddd;
  font-size:16px;
}

.correct { background:#4caf50; color:white; }
.wrong { background:#f44336; color:white; }
.selected { border:2px solid #2196f3; }

/* BUTTON NAV */
.nav {
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  display:flex;
  justify-content:space-around;
  background:white;
  padding:10px;
  box-shadow:0 -2px 5px rgba(0,0,0,0.1);
}

.nav button {
  flex:1;
  margin:5px;
  padding:15px;
  font-size:18px;
  border:none;
  border-radius:10px;
  background:#2196f3;
  color:white;
}

/* SIDEBAR */
#drawer {
  position:fixed;
  left:-100%;
  top:0;
  width:80%;
  height:100%;
  background:white;
  transition:0.3s;
  overflow:auto;
  z-index:20;
  padding:10px;
}

#drawer.open { left:0; }

.q-btn {
  width:40px;
  height:40px;
  margin:5px;
  border:none;
  border-radius:6px;
}

.correct-btn { background:#4caf50; color:white; }
.wrong-btn { background:#f44336; color:white; }
.current { background:#2196f3; color:white; }

/* MENU BUTTON */
.menu {
  position:fixed;
  top:15px;
  left:10px;
  font-size:20px;
  z-index:30;
}
</style>
</head>

<body>

<div class="menu" onclick="toggleDrawer()">☰</div>

<div id="drawer"></div>

<div class="header">
  <div class="topbar">
    <span id="info"></span>
    <span id="score"></span>
    <span id="time"></span>
  </div>
  <div id="progress"><div id="progress-bar"></div></div>
</div>

<div class="container" id="app"></div>

<div class="nav">
  <button onclick="prev()">⬅</button>
  <button onclick="next()">➡</button>
  <button onclick="submit()">Nộp</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<script>
let allQuestions = [];
let questions = [];
let current = 0;
let answers = {};
let wrongList = [];
let mode = "practice";
let time = 3600;
let timer;

// 👉 score realtime
function getScore(){
  let s=0;
  questions.forEach((q,i)=>{
    if(answers[i]===q.correct) s++;
  });
  return s;
}

function toggleDrawer(){
  document.getElementById("drawer").classList.toggle("open");
}

// START
async function startMode(m){
  mode = m;
  await loadExcel();
}

// LOAD
async function loadExcel(){
  const url = "https://raw.githubusercontent.com/hoangnam248-byte/quiz-app/main/data.xlsx";

  const res = await fetch(url);
  const buffer = await res.arrayBuffer();

  const wb = XLSX.read(buffer, {type:'array'});
  const sheet = wb.Sheets[wb.SheetNames[0]];
  const json = XLSX.utils.sheet_to_json(sheet);

  allQuestions = json.map((r,i)=>({
    question:r["Câu hỏi"],
    A:r["Đáp án A"],
    B:r["Đáp án B"],
    C:r["Đáp án C"],
    D:r["Đáp án D"],
    correct:r["Đáp án đúng"]
  }));

  if(mode==="practice"){
    questions = [...allQuestions];
  } else {
    questions = [...allQuestions].sort(()=>Math.random()-0.5).slice(0,70);
  }

  startQuiz();
}

// START QUIZ
function startQuiz(){
  answers = {};
  current = 0;
  time = 3600;

  clearInterval(timer);
  timer = setInterval(()=>{
    time--;
    render();
  },1000);

  render();
}

// RENDER
function render(){
  if(time<=0){ submit(); return; }

  const q = questions[current];

  document.getElementById("info").innerText = `Câu ${current+1}/${questions.length}`;
  document.getElementById("score").innerText = `Điểm: ${getScore()}/${questions.length}`;
  document.getElementById("time").innerText = `${Math.floor(time/60)}:${("0"+time%60).slice(-2)}`;

  const percent = Math.floor((Object.keys(answers).length/questions.length)*100);
  document.getElementById("progress-bar").style.width = percent+"%";

  document.getElementById("app").innerHTML = `
    <div class="question">${q.question}</div>
    ${["A","B","C","D"].map(k=>{
      let cls="answer";

      if(answers[current]===k) cls+=" selected";

      if(mode==="practice" && answers[current]){
        if(k===q.correct) cls+=" correct";
        if(answers[current]===k && k!==q.correct) cls+=" wrong";
      }

      return `<div class="${cls}" onclick="select('${k}')">${k}. ${q[k]}</div>`;
    }).join("")}
  `;

  renderSidebar();
}

// SIDEBAR
function renderSidebar(){
  const d = document.getElementById("drawer");

  d.innerHTML = questions.map((q,i)=>{
    let cls="q-btn";

    if(i===current) cls+=" current";

    if(answers[i]){
      if(answers[i]===q.correct) cls+=" correct-btn";
      else cls+=" wrong-btn";
    }

    return `<button class="${cls}" onclick="go(${i})">${i+1}</button>`;
  }).join("");
}

// ACTION
function select(k){
  if(mode==="practice" && answers[current]) return;
  answers[current]=k;
  render();
}

function next(){ if(current<questions.length-1) current++; render(); }
function prev(){ if(current>0) current--; render(); }
function go(i){ current=i; toggleDrawer(); render(); }

// SUBMIT
function submit(){
  clearInterval(timer);

  let score = getScore();

  document.getElementById("app").innerHTML = `
    <h2>Kết quả</h2>
    <h3>${score}/${questions.length}</h3>
  `;
}

// START DEFAULT
startMode("practice");
</script>

</body>
</html>
